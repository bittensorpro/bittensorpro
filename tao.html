<script>
/* =========================================================================
   CONFIGURACIÓN
   ========================================================================= */
const API_BASE = 'https://tao360.qrchd889gj.workers.dev';
const CG_BASE = 'https://api.coingecko.com/api/v3/coins/bittensor';
const RAO = 1_000_000_000;

const STATE = {
  cg: null,           // CoinGecko data principal
  history: null,      // CoinGecko histórico
  exchanges: [],      // CoinGecko tickers
  fearGreed: null,    // promedio de top 10 subnets
  fearGreedCount: 0,
  timeframe: 7,       // días por defecto (7d)
  chart: null,
};

/* =========================================================================
   FORMATTERS
   ========================================================================= */
function fmtPrice(usd){
  if(!usd && usd !== 0) return '—';
  if(usd < 0.01) return '$' + usd.toFixed(5);
  if(usd < 1)    return '$' + usd.toFixed(4);
  if(usd < 100)  return '$' + usd.toFixed(2);
  return '$' + usd.toLocaleString('en-US',{maximumFractionDigits:2});
}
function fmtMoney(usd){
  if(!usd && usd !== 0) return '—';
  if(usd >= 1e9) return '$' + (usd/1e9).toFixed(2) + 'B';
  if(usd >= 1e6) return '$' + (usd/1e6).toFixed(2) + 'M';
  if(usd >= 1e3) return '$' + (usd/1e3).toFixed(2) + 'K';
  return '$' + usd.toFixed(2);
}
function fmtSupply(num){
  if(!num && num !== 0) return '—';
  if(num >= 1e6) return (num/1e6).toFixed(2) + 'M';
  if(num >= 1e3) return (num/1e3).toFixed(2) + 'K';
  return num.toFixed(0);
}
function fmtPct(v){
  if(v === null || v === undefined || isNaN(v)) return '—';
  const sign = v > 0 ? '+' : '';
  return sign + v.toFixed(2) + '%';
}
function pctClass(v){
  if(v > 0.001) return 'pos';
  if(v < -0.001) return 'neg';
  return 'zero';
}
function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g,c=>(
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

/* =========================================================================
   FEAR & GREED CATEGORIZATION
   ========================================================================= */
function fgCategory(value){
  if(value === null || value === undefined) return { label: '—', color: '#6b7385' };
  if(value < 25) return { label: 'Extreme Fear',   color: '#ff4d5e' };
  if(value < 45) return { label: 'Fear',            color: '#ff7e5e' };
  if(value < 56) return { label: 'Neutral',         color: '#b0b0b0' };
  if(value < 75) return { label: 'Greed',           color: '#7adb95' };
  return { label: 'Extreme Greed', color: '#22d87a' };
}

/* =========================================================================
   CARGA DE DATOS
   ========================================================================= */
async function fetchCoinGecko(){
  try{
    const url = `${CG_BASE}?localization=false&tickers=true&market_data=true&community_data=false&developer_data=false`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('CoinGecko coin failed');
    return await r.json();
  }catch(e){
    console.error(e);
    return null;
  }
}

async function fetchHistory(days){
  try{
    const url = `${CG_BASE}/market_chart?vs_currency=usd&days=${days}`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('CoinGecko history failed');
    return await r.json();
  }catch(e){
    console.error(e);
    return null;
  }
}

async function fetchFearGreed(){
  // Tomar top 10 subnets por mcap y promediar fear_and_greed_index
  try{
    const [r1, r2] = await Promise.all([
      fetch(`${API_BASE}/api/dtao/pool/latest/v1?page=1&limit=100`),
      fetch(`${API_BASE}/api/dtao/pool/latest/v1?page=2&limit=100`),
    ]);
    const j1 = await r1.json();
    const j2 = await r2.json();
    const list = [
      ...(j1.data || []),
      ...(j2.data || []),
    ];

    // Filtrar las que tienen fear_and_greed_index y mcap válidos
    const valid = list.filter(s =>
      s.fear_and_greed_index !== null &&
      s.fear_and_greed_index !== undefined &&
      parseFloat(s.market_cap) > 0
    );

    if(valid.length === 0) return { value: null, count: 0 };

    // Ordenar por mcap descendente y coger top 10
    valid.sort((a, b) => parseFloat(b.market_cap) - parseFloat(a.market_cap));
    const top10 = valid.slice(0, 10);

    // Promediar
    const sum = top10.reduce((acc, s) => acc + parseFloat(s.fear_and_greed_index), 0);
    const avg = sum / top10.length;

    return { value: Math.round(avg), count: top10.length };
  }catch(e){
    console.error('Fear & Greed error', e);
    return { value: null, count: 0 };
  }
}

/* =========================================================================
   RENDER
   ========================================================================= */
function renderError(msg){
  document.getElementById('content').innerHTML = `
    <div class="error-state">
      <h2>Error cargando datos</h2>
      <p>${escapeHtml(msg)}</p>
      <a href="javascript:location.reload()" class="btn">Reintentar</a>
    </div>
  `;
}

function renderPage(){
  const cg = STATE.cg;
  if(!cg || !cg.market_data){
    renderError('No se pudieron cargar los datos de TAO desde CoinGecko. Inténtalo más tarde.');
    return;
  }

  const md = cg.market_data;
  const price = md.current_price?.usd || 0;
  const change24h = md.price_change_percentage_24h || 0;

  const stats = {
    mcap:      md.market_cap?.usd || 0,
    vol24h:    md.total_volume?.usd || 0,
    supply:    md.circulating_supply || 0,
    maxSupply: md.max_supply || 21_000_000,
    ath:       md.ath?.usd || 0,
    athChange: md.ath_change_percentage?.usd || 0,
    change1h:  md.price_change_percentage_1h_in_currency?.usd || 0,
    change7d:  md.price_change_percentage_7d || 0,
    change30d: md.price_change_percentage_30d || 0,
    change1y:  md.price_change_percentage_1y || 0,
  };

  const minedPct = (stats.supply / stats.maxSupply) * 100;

  // Fear & Greed
  const fg = STATE.fearGreed;
  let fgSection = '';
  if(fg && fg.value !== null){
    const cat = fgCategory(fg.value);
    const markerLeft = Math.max(0, Math.min(100, fg.value));
    fgSection = `
      <div class="fg-section">
        <div class="section-label">// Sentimiento del ecosistema</div>
        <div class="fg-card">
          <div class="fg-value-row">
            <div class="fg-value">${fg.value}</div>
            <div class="fg-label" style="color:${cat.color}">${cat.label}</div>
          </div>
          <div class="fg-bar-wrap">
            <div class="fg-bar">
              <div class="fg-marker" style="left:${markerLeft}%"></div>
            </div>
            <div class="fg-scale">
              <span>Extreme Fear</span>

      <div class="stats-grid">

async function loadHistoryAndRenderChart(){
  STATE.history = await fetchHistory(STATE.timeframe);
  renderChart();
}

function renderChart(){
  if(!STATE.history || !STATE.history.prices || STATE.history.prices.length === 0) return;

  const canvas = document.getElementById('price-chart');
  if(!canvas) return;

  if(STATE.chart){
    STATE.chart.destroy();
    STATE.chart = null;
  }

  // CoinGecko devuelve [[timestamp_ms, price], ...]
  const points = STATE.history.prices;
  const dataUSD = points.map(p => p[1]);
  const times = points.map(p => new Date(p[0]));

  // Labels según timeframe
  const labels = times.map(t => {
    if(STATE.timeframe === 1){
      return t.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }
    if(STATE.timeframe <= 30){
      return t.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
    }
    return t.toLocaleDateString('es-ES', { month: 'short', year: '2-digit' });
  });

  // Color según tendencia
  const isPositive = dataUSD[dataUSD.length - 1] >= dataUSD[0];
  const lineColor = isPositive ? '#22d87a' : '#ff4d5e';
  const fillColor = isPositive ? 'rgba(34,216,122,0.08)' : 'rgba(255,77,94,0.08)';

  const ctx = canvas.getContext('2d');
  STATE.chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: dataUSD,
        borderColor: lineColor,
        backgroundColor: fillColor,
        borderWidth: 2,
        fill: true,
        tension: 0.25,
        pointRadius: 0,
        pointHoverRadius: 6,
        pointHoverBackgroundColor: lineColor,
        pointHoverBorderColor: '#fff',
        pointHoverBorderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(13,15,23,0.95)',
          titleColor: '#a8b2c0',
          bodyColor: '#fff',
          borderColor: 'rgba(0,240,255,0.3)',
          borderWidth: 1,
          padding: 12,
          titleFont: { family: "'Share Tech Mono', monospace", size: 11 },
          bodyFont: { family: "'Orbitron', sans-serif", size: 14, weight: '600' },
          displayColors: false,
          callbacks: {
            title: (items) => {
              if(!items.length) return '';
              const i = items[0].dataIndex;
              const t = times[i];
              if(!t) return items[0].label;
              if(STATE.timeframe === 1){
                return t.toLocaleString('es-ES', {
                  day: 'numeric', month: 'short',
                  hour: '2-digit', minute: '2-digit'
                });
              }
              return t.toLocaleDateString('es-ES', {
                day: 'numeric', month: 'short', year: 'numeric'
              });
            },
            label: (ctx) => {
              const v = ctx.parsed.y;
              if(v < 1) return '$' + v.toFixed(4);
              if(v < 100) return '$' + v.toFixed(2);
              return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 2 });
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            color: '#6b7385',
            font: { family: "'Share Tech Mono', monospace", size: 10 },
            maxRotation: 0, autoSkip: true, maxTicksLimit: 6,
          },
          border: { color: 'rgba(0,240,255,0.10)' }
        },
        y: {
          grid: { color: 'rgba(0,240,255,0.05)', drawBorder: false },
          ticks: {
            color: '#6b7385',
            font: { family: "'Share Tech Mono', monospace", size: 10 },
            callback: (v) => {
              if(v < 1) return '$' + v.toFixed(2);
              if(v < 100) return '$' + v.toFixed(0);
              return '$' + Math.round(v).toLocaleString('en-US');
            }
          },
          border: { display: false }
        }
      }
    }
  });
}

/* =========================================================================
   PARSEO DE EXCHANGES (CoinGecko tickers)
   ========================================================================= */
function parseExchanges(cg){
  if(!cg || !cg.tickers) return [];

  // Filtrar y normalizar
  const VALID_TARGETS = ['USDT', 'USD', 'USDC', 'BUSD', 'EUR'];
  const filtered = cg.tickers
    .filter(t =>
      t.target && VALID_TARGETS.includes(t.target.toUpperCase()) &&
      t.trust_score !== 'red' &&
      t.converted_volume?.usd > 0
    )
    .map(t => ({
      name: t.market?.name || 'Unknown',
      pair: `TAO/${t.target.toUpperCase()}`,
      volume: t.converted_volume.usd,
      tradeUrl: t.trade_url || '#',
    }));

  // Deduplicar por exchange (nos quedamos con el de mayor volumen)
  const byExchange = {};
  for(const ex of filtered){
    if(!byExchange[ex.name] || byExchange[ex.name].volume < ex.volume){
      byExchange[ex.name] = ex;
    }
  }

  // Ordenar por volumen descendente y top 10
  return Object.values(byExchange)
    .sort((a, b) => b.volume - a.volume)
    .slice(0, 10);
}

async function init(){
  // Cargar todo en paralelo
  const [cg, history, fg] = await Promise.all([
    fetchCoinGecko(),
    fetchHistory(STATE.timeframe),
    fetchFearGreed(),
  ]);

  if(!cg){
    renderError('No se pudieron cargar los datos. Es posible que CoinGecko esté limitando peticiones. Inténtalo en unos segundos.');
    return;
  }

  STATE.cg = cg;
  STATE.history = history;
  STATE.exchanges = parseExchanges(cg);
  STATE.fearGreed = fg;

  renderPage();
}

init();

// Botón "Volver" inteligente: usa history.back() siempre que sea posible
(function setupSmartBack(){
  const link = document.getElementById('back-link');
  if(!link) return;

  // Detectar de dónde viene mediante varias fuentes
  let fromPath = '';

  // Método 1: sessionStorage (lo guardó la página anterior antes de salir)
  try {
    fromPath = sessionStorage.getItem('lastPage') || '';
  } catch(e){}

  // Método 2: document.referrer como fallback (a veces funciona)
  if(!fromPath && document.referrer){
    try {
      const refUrl = new URL(document.referrer);
      if(refUrl.origin === window.location.origin){
        fromPath = refUrl.pathname.split('/').pop() || 'index.html';
      }
    } catch(e){}
  }

  // Construir el texto del botón según de dónde viene
  const labels = {
    'market.html':           '← Volver al Market',
    'aprende.html':          '← Volver a Aprende',
    'index.html':            '← Volver al inicio',
    '':                      '← Volver al inicio',
    'que-es-bittensor.html': '← Volver a la guía',
    'subnet.html':           '← Volver a la subnet',
  };
  if(fromPath.startsWith('aprende-modulo-')){
    link.textContent = '← Volver al módulo';
  } else if(labels[fromPath] !== undefined){
    link.textContent = labels[fromPath];
  } else if(fromPath){
    link.textContent = '← Volver';
  }
  // Si fromPath está vacío, dejamos el texto por defecto del HTML

  // El click siempre intenta history.back() primero
  link.addEventListener('click', function(e){
    // Si tenemos historial real Y venimos del mismo sitio, usamos back
    if(fromPath && window.history.length > 1){
      e.preventDefault();
      window.history.back();
    }
    // Si no, dejamos que el href haga su trabajo (market.html como fallback)
  });
})();

// Antes de salir de esta página, guardar dónde estamos para que la próxima sepa
window.addEventListener('beforeunload', function(){
  try {
    const here = window.location.pathname.split('/').pop() || 'index.html';
    sessionStorage.setItem('lastPage', here);
  } catch(e){}
});

// También al cambiar de visibilidad (iOS dispara esto antes de unload)
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'hidden'){
    try {
      const here = window.location.pathname.split('/').pop() || 'index.html';
      sessionStorage.setItem('lastPage', here);
    } catch(e){}
  }
});
</script>
