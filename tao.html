/* SENTIMIENTO */

.sentiment-bar-row{display:flex;align-items:center;gap:12px;margin-top:12px}

<script>
/* =========================================================================
   CONFIGURACIÓN
   ========================================================================= */
const _t = window.t || (k => k);
const API_BASE = 'https://tao360.qrchd889gj.workers.dev';
const CG_API  = 'https://api.coingecko.com/api/v3';
const RAO = 1_000_000_000;

const STATE = {
  cg: null,           // /coins/markets flat object
  community: null,    // sentiment votes
  history: null,      // CoinGecko histórico
  exchanges: [],      // CoinGecko tickers
  fearGreed: null,    // promedio de top 10 subnets
  fearGreedCount: 0,
  timeframe: 7,       // días por defecto (7d)
  chart: null,
};

/* =========================================================================
   FORMATTERS
   ========================================================================= */
function fmtPrice(usd){
  if(!usd && usd !== 0) return '—';
  if(usd < 0.01) return '$' + usd.toFixed(5);
  if(usd < 1)    return '$' + usd.toFixed(4);
  if(usd < 100)  return '$' + usd.toFixed(2);
  return '$' + usd.toLocaleString('en-US',{maximumFractionDigits:2});
}
function fmtMoney(usd){
  if(!usd && usd !== 0) return '—';
  if(usd >= 1e9) return '$' + (usd/1e9).toFixed(2) + 'B';
  if(usd >= 1e6) return '$' + (usd/1e6).toFixed(2) + 'M';
  if(usd >= 1e3) return '$' + (usd/1e3).toFixed(2) + 'K';
  return '$' + usd.toFixed(2);
}
function fmtSupply(num){
  if(!num && num !== 0) return '—';
  if(num >= 1e6) return (num/1e6).toFixed(2) + 'M';
  if(num >= 1e3) return (num/1e3).toFixed(2) + 'K';
  return num.toFixed(0);
}
function fmtPct(v){
  if(v === null || v === undefined || isNaN(v)) return '—';
  const sign = v > 0 ? '+' : '';
  return sign + v.toFixed(2) + '%';
}
function pctClass(v){
  if(v > 0.001) return 'pos';
  if(v < -0.001) return 'neg';
  return 'zero';
}
function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g,c=>(
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

/* =========================================================================
   FEAR & GREED CATEGORIZATION
   ========================================================================= */
function fgCategory(value){
  if(value === null || value === undefined) return { label: '—', color: '#6b7385' };
  if(value < 25) return { label: 'Extreme Fear',   color: '#ff4d5e' };
  if(value < 45) return { label: 'Fear',            color: '#ff7e5e' };
  if(value < 56) return { label: 'Neutral',         color: '#b0b0b0' };
  if(value < 75) return { label: 'Greed',           color: '#7adb95' };
  return { label: 'Extreme Greed', color: '#22d87a' };
}

/* =========================================================================
   CARGA DE DATOS
   ========================================================================= */
async function fetchMarketData(){
  try{
    const url = `${CG_API}/coins/markets?vs_currency=usd&ids=bittensor&order=market_cap_desc&per_page=1&page=1&sparkline=false&price_change_percentage=1h,7d,30d,1y`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('CoinGecko markets failed: ' + r.status);
    const arr = await r.json();
    return arr[0] || null;
  }catch(e){
    console.error(e);
    return null;
  }
}

async function fetchCommunityData(){
  try{
    const url = `${CG_API}/coins/bittensor?localization=false&tickers=false&market_data=false&community_data=true&developer_data=false`;
    const r = await fetch(url);
    if(!r.ok) return null;
    const d = await r.json();
    return {
      sentimentUp:   parseFloat(d.sentiment_votes_up_percentage)   || 0,
      sentimentDown: parseFloat(d.sentiment_votes_down_percentage) || 0,
    };
  }catch(e){ return null; }
}

async function fetchTickers(){
  try{
    const url = `${CG_API}/coins/bittensor/tickers?include_exchange_logo=false&page=1&order=volume_desc&depth=false`;
    const r = await fetch(url);
    if(!r.ok) return [];
    const d = await r.json();
    return d.tickers || [];
  }catch(e){ return []; }
}

async function fetchHistory(days){
  try{
    const url = `${CG_API}/coins/bittensor/market_chart?vs_currency=usd&days=${days}`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('CoinGecko history failed');
    return await r.json();
  }catch(e){
    console.error(e);
    return null;
  }
}

async function fetchFearGreed(){
  // Tomar top 10 subnets por mcap y promediar fear_and_greed_index
  try{
    const [r1, r2] = await Promise.all([
      fetch(`${API_BASE}/api/dtao/pool/latest/v1?page=1&limit=100`),
      fetch(`${API_BASE}/api/dtao/pool/latest/v1?page=2&limit=100`),
    ]);
    const j1 = await r1.json();
    const j2 = await r2.json();
    const list = [
      ...(j1.data || []),
      ...(j2.data || []),
    ];

    // Filtrar las que tienen fear_and_greed_index y mcap válidos
    const valid = list.filter(s =>
      s.fear_and_greed_index !== null &&
      s.fear_and_greed_index !== undefined &&
      parseFloat(s.market_cap) > 0
    );

    if(valid.length === 0) return { value: null, count: 0 };

    // Ordenar por mcap descendente y coger top 10
    valid.sort((a, b) => parseFloat(b.market_cap) - parseFloat(a.market_cap));
    const top10 = valid.slice(0, 10);

    // Promediar
    const sum = top10.reduce((acc, s) => acc + parseFloat(s.fear_and_greed_index), 0);
    const avg = sum / top10.length;

    return { value: Math.round(avg), count: top10.length };
  }catch(e){
    console.error('Fear & Greed error', e);
    return { value: null, count: 0 };
  }
}

function renderChart(){
  if(!STATE.history || !STATE.history.prices || STATE.history.prices.length === 0) return;

  const canvas = document.getElementById('price-chart');
  if(!canvas) return;

  if(STATE.chart){ STATE.chart.destroy(); STATE.chart = null; }

  const locale = window.getLang && window.getLang() === 'en' ? 'en-US' : 'es-ES';
  const prices = STATE.history.prices;
  const volumes = STATE.history.total_volumes || [];

  const priceData = prices.map(p => p[1]);
  const volData   = volumes.map(v => v[1]);
  const times     = prices.map(p => new Date(p[0]));

  // Stat bar
  const pOpen = priceData[0], pClose = priceData[priceData.length-1];
  const pHigh = Math.max(...priceData), pLow = Math.min(...priceData);
  const pChange = pOpen > 0 ? ((pClose-pOpen)/pOpen)*100 : 0;
  const isPositive = pClose >= pOpen;
  const lineColor = isPositive ? '#22d87a' : '#ff4d5e';
  updateTaoStatBar(pOpen, pClose, pHigh, pLow, pChange, isPositive);

  // Labels
  const labels = times.map(t => {
    if(STATE.timeframe === 1)
      return t.toLocaleTimeString(locale, {hour:'2-digit',minute:'2-digit'});
    if(STATE.timeframe <= 30)
      return t.toLocaleDateString(locale, {day:'numeric',month:'short'});
    return t.toLocaleDateString(locale, {month:'short',year:'2-digit'});
  });

  const fmtTooltipPrice = v => {
    if(v < 1) return '$' + v.toFixed(4);
    if(v < 100) return '$' + v.toFixed(2);
    return '$' + v.toLocaleString('en-US',{maximumFractionDigits:2});
  };

  // Canvas gradient
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.offsetHeight || 300);
  grad.addColorStop(0,   isPositive ? 'rgba(34,216,122,0.28)' : 'rgba(255,77,94,0.28)');
  grad.addColorStop(0.65, isPositive ? 'rgba(34,216,122,0.06)' : 'rgba(255,77,94,0.06)');
  grad.addColorStop(1,   'rgba(0,0,0,0)');

  // Max vol para que barras ocupen ~20% del chart
  const maxVol = Math.max(...volData) || 1;

  STATE.chart = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        {
          type: 'line',
          data: priceData,
          yAxisID: 'yPrice',
          borderColor: lineColor,
          backgroundColor: grad,
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: lineColor,
          pointHoverBorderColor: '#fff',
          pointHoverBorderWidth: 2,
          order: 1,
        },
        {
          type: 'bar',
          data: volData,
          yAxisID: 'yVol',
          backgroundColor: isPositive ? 'rgba(34,216,122,0.12)' : 'rgba(255,77,94,0.12)',
          borderColor: isPositive ? 'rgba(34,216,122,0.25)' : 'rgba(255,77,94,0.25)',
          borderWidth: 1,
          borderRadius: 1,
          order: 2,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400, easing: 'easeInOutQuart' },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(10,12,20,0.97)',
          titleColor: '#6b7385',
          bodyColor: '#fff',
          borderColor: isPositive ? 'rgba(34,216,122,0.4)' : 'rgba(255,77,94,0.4)',
          borderWidth: 1,
          padding: { top:10, right:14, bottom:10, left:14 },
          titleFont: { family: "'Outfit', sans-serif", size: 10 },
          bodyFont: { family: "'Share Tech Mono', monospace", size: 14 },
          displayColors: false,
          filter: item => item.datasetIndex === 0,
          callbacks: {
            title: items => {
              if(!items.length) return '';
              const t = times[items[0].dataIndex];
              if(!t) return items[0].label;
              if(STATE.timeframe === 1)
                return t.toLocaleString(locale, {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
              return t.toLocaleDateString(locale, {day:'numeric',month:'short',year:'numeric'});
            },
            label: ctx => ' ' + fmtTooltipPrice(ctx.parsed.y),
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            color: '#4a5263',
            font: { family: "'Outfit', sans-serif", size: 9 },
            maxRotation: 0, autoSkip: true,
            maxTicksLimit: STATE.timeframe === 365 ? 8 : 6,
          },
          border: { color: 'rgba(0,240,255,0.08)' }
        },
        yPrice: {
          position: 'right',
          grid: { color: 'rgba(0,240,255,0.04)' },
          ticks: {
            color: '#4a5263',
            font: { family: "'Share Tech Mono', monospace", size: 9 },
            maxTicksLimit: 5,
            callback: v => {
              if(v < 1) return '$' + v.toFixed(2);
              if(v < 100) return '$' + v.toFixed(0);
              return '$' + Math.round(v).toLocaleString('en-US');

}

function updateTaoStatBar(open, close, high, low, changePct, isPositive){
  const bar = document.getElementById('chart-stat-bar');
  if(!bar) return;
  const fmt = v => {
    if(!v) return '—';
    if(v < 1) return '$' + v.toFixed(4);
    if(v < 100) return '$' + v.toFixed(2);
    return '$' + v.toLocaleString('en-US',{maximumFractionDigits:2});
  };
  const sign = changePct > 0 ? '+' : '';
  const cls = changePct > 0.001 ? 'pos' : changePct < -0.001 ? 'neg' : '';
  bar.innerHTML = `
    <div class="chart-stat-item"><span class="chart-stat-lbl">${_t('tao.chart.open')}</span><span class="chart-stat-val">${fmt(open)}</span></div>
    <div class="chart-stat-item"><span class="chart-stat-lbl">${_t('tao.chart.close')}</span><span class="chart-stat-val">${fmt(close)}</span></div>
    <div class="chart-stat-item"><span class="chart-stat-lbl">↑ ${_t('tao.chart.high')}</span><span class="chart-stat-val pos">${fmt(high)}</span></div>
    <div class="chart-stat-item"><span class="chart-stat-lbl">↓ ${_t('tao.chart.low')}</span><span class="chart-stat-val neg">${fmt(low)}</span></div>
    <div class="chart-stat-item"><span class="chart-stat-lbl">${_t('tao.chart.change')}</span><span class="chart-stat-val ${cls}">${sign}${changePct.toFixed(2)}%</span></div>
  `;
}

/* =========================================================================
   PARSEO DE EXCHANGES (CoinGecko tickers)
   ========================================================================= */
function parseExchanges(tickers){
  if(!tickers || !tickers.length) return [];

  // Filtrar y normalizar
  const VALID_TARGETS = ['USDT', 'USD', 'USDC', 'BUSD', 'EUR'];
  const filtered = tickers
    .filter(t =>
      t.target && VALID_TARGETS.includes(t.target.toUpperCase()) &&
      t.trust_score !== 'red' &&
      t.converted_volume?.usd > 0
    )
    .map(t => ({
      name: t.market?.name || 'Unknown',
      pair: `TAO/${t.target.toUpperCase()}`,
      volume: t.converted_volume.usd,
      tradeUrl: t.trade_url || '#',
    }));

  // Deduplicar por exchange (nos quedamos con el de mayor volumen)
  const byExchange = {};
  for(const ex of filtered){
    if(!byExchange[ex.name] || byExchange[ex.name].volume < ex.volume){
      byExchange[ex.name] = ex;
    }
  }

  // Ordenar por volumen descendente y top 10
  return Object.values(byExchange)
    .sort((a, b) => b.volume - a.volume)
    .slice(0, 10);
}

// Botón "Volver" inteligente: usa history.back() siempre que sea posible
function setupSmartBack(){
  const link = document.getElementById('back-link');
  if(!link) return;

  // Detectar de dónde viene mediante varias fuentes
  let fromPath = '';

  // Método 1: sessionStorage (lo guardó la página anterior antes de salir)
  try {
    fromPath = sessionStorage.getItem('lastPage') || '';
  } catch(e){}

  // Método 2: document.referrer como fallback (a veces funciona)
  if(!fromPath && document.referrer){
    try {
      const refUrl = new URL(document.referrer);
      if(refUrl.origin === window.location.origin){
        fromPath = refUrl.pathname.split('/').pop() || 'index.html';
      }
    } catch(e){}
  }

  // Construir el texto del botón según de dónde viene
  const labels = {
    'market.html':           _t('nav.back.market'),
    'aprende.html':          _t('tao.back.learn'),
    'index.html':            _t('tao.back.home'),
    '':                      _t('tao.back.home'),
    'que-es-bittensor.html': _t('tao.back.guide'),
    'subnet.html':           _t('tao.back.subnet'),
  };
  if(fromPath.startsWith('aprende-modulo-')){
    link.textContent = _t('tao.back.module');
  } else if(labels[fromPath] !== undefined){
    link.textContent = labels[fromPath];
  } else if(fromPath){
    link.textContent = _t('nav.back');
  }
  // Si fromPath está vacío, dejamos el texto por defecto del HTML

  // El click siempre intenta history.back() primero
  link.addEventListener('click', function(e){
    // Si tenemos historial real Y venimos del mismo sitio, usamos back
    if(fromPath && window.history.length > 1){
      e.preventDefault();
      window.history.back();
    }
    // Si no, dejamos que el href haga su trabajo (market.html como fallback)
  });
}

// Antes de salir de esta página, guardar dónde estamos para que la próxima sepa
window.addEventListener('beforeunload', function(){
  try {
    const here = window.location.pathname.split('/').pop() || 'index.html';
    sessionStorage.setItem('lastPage', here);
  } catch(e){}
});

// También al cambiar de visibilidad (iOS dispara esto antes de unload)
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'hidden'){
    try {
      const here = window.location.pathname.split('/').pop() || 'index.html';
      sessionStorage.setItem('lastPage', here);
    } catch(e){}
  }
});
</script>
</body>
