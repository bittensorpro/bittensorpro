/* =========================================================================

function fmtPriceUSD(taoPrice){
  const usd = taoPrice * STATE.taoUsd;
  if(usd === 0) return '—';
  if(usd < 0.01) return '$' + usd.toFixed(5);
  if(usd < 1)    return '$' + usd.toFixed(4);
  if(usd < 100)  return '$' + usd.toFixed(2);
  return '$' + usd.toLocaleString('en-US',{maximumFractionDigits:2});
}
function fmtMoneyUSD(taoVal){
  const usd = taoVal * STATE.taoUsd;
  if(usd === 0) return '—';
  if(usd >= 1e9) return '$' + (usd/1e9).toFixed(2) + 'B';
  if(usd >= 1e6) return '$' + (usd/1e6).toFixed(2) + 'M';
  if(usd >= 1e3) return '$' + (usd/1e3).toFixed(2) + 'K';
  return '$' + usd.toFixed(2);
}

/* =========================================================================
   CARGA DE DATOS
   ========================================================================= */
async function fetchTaoPrice(){
  try{
    const r = await fetch(`${API_BASE}/api/price/latest/v1?asset=tao`);
    const j = await r.json();
    if(j && j.data && j.data[0]){
      STATE.taoUsd = parseFloat(j.data[0].price) || 0;
    }
  }catch(e){
    console.error('Error fetching TAO price', e);
  }
}

async function fetchSubnetData(netuid, retries = 2){
  // Buscamos el item con el netuid en las páginas paginadas
  // Con retries para soportar Worker lento o fallos intermitentes
  for(let attempt = 0; attempt <= retries; attempt++){
    const pages = [1, 2];
    for(const page of pages){
      try{
        const controller = new AbortController();
        const tid = setTimeout(() => controller.abort(), 8000);
        const r = await fetch(`${API_BASE}/api/dtao/pool/latest/v1?page=${page}&limit=100`, {
          signal: controller.signal
        });
        clearTimeout(tid);
        const j = await r.json();
        const list = (j && j.data) ? j.data : (Array.isArray(j) ? j : []);
        const item = list.find(x => parseInt(x.netuid,10) === netuid);
        if(item) return item;
      }catch(e){
        console.error(`Error fetching pool data (attempt ${attempt+1}, page ${page})`, e);
      }
    }
    // Si llegamos aquí en las 2 páginas y no se encontró, esperamos antes del siguiente intento
    if(attempt < retries){
      await new Promise(r => setTimeout(r, 1500 * (attempt + 1)));
    }
  }
  return null;
}

  try{
    const r = await fetch(SUBNETS_INFO_URL);
    if(!r.ok) return null;
    const j = await r.json();
    return j[String(STATE.netuid)] || null;
  }catch(e){
    console.error('Error fetching subnet info JSON', e);
    return null;
  }
}

/* =========================================================================
   PARSEO Y NORMALIZACIÓN
   ========================================================================= */
function parseSubnet(raw){
  const id = parseInt(raw.netuid, 10);
  const def = SUBNET_DEFS[id] || {};
  let symbol = def.symbol || '';
  let name = def.name || `Subnet ${id}`;

  // Si tenemos info del JSON oficial, prevalece para nombre
  if(STATE.info && STATE.info.name && STATE.info.name !== 'Unknown'){
    name = STATE.info.name;
  }

  // Series temporales: cada item es {block_number, timestamp, price}
  let sevenDayPoints = []; // Array de {price: number, time: Date}
  
  if(Array.isArray(raw.seven_day_prices)){
    sevenDayPoints = raw.seven_day_prices.map(p => {
      let price = NaN;
      let time = null;
      if(typeof p === 'number'){
        price = p;
      }else if(typeof p === 'string'){
        price = parseFloat(p);
      }else if(p && typeof p === 'object'){
        price = parseFloat(p.price || p.value || p.p || p[0]) || NaN;
        if(p.timestamp) time = new Date(p.timestamp);
      }
      return { price, time };
    }).filter(pt => !isNaN(pt.price) && pt.price > 0);
  }
  // Fallback: string JSON
  else if(typeof raw.seven_day_prices === 'string'){
    try{
      const parsed = JSON.parse(raw.seven_day_prices);
      if(Array.isArray(parsed)){
        sevenDayPoints = parsed.map(p => ({
          price: parseFloat(p.price || p),
          time: p.timestamp ? new Date(p.timestamp) : null
        })).filter(pt => !isNaN(pt.price) && pt.price > 0);
      }
    }catch(e){}
  }

  return {
    id,
    symbol,
    name,
    price:        parseFloat(raw.price) || 0,
    marketCap:    (parseFloat(raw.market_cap) || 0) / RAO,
    volume:       (parseFloat(raw.tao_volume_24_hr) || 0) / RAO,
    liquidity:    (parseFloat(raw.liquidity) || 0) / RAO,
    totalAlpha:   (parseFloat(raw.total_alpha) || 0) / RAO,
    change1h:     parseFloat(raw.price_change_1_hour)  || 0,
    change24h:    parseFloat(raw.price_change_1_day)   || 0,
    change7d:     parseFloat(raw.price_change_1_week)  || 0,
    change30d:    parseFloat(raw.price_change_1_month) || 0,
    sevenDayPoints,
  };
}

function updatePriceChange(){

    changeEl.className = 'price-change ' + pctClass(change);
    changeEl.textContent = fmtPct(change);
  }
  if(labelEl) labelEl.textContent = tfLabel;
}

function renderChart(){
  const s = STATE.subnet;
  const wrap = document.getElementById('chart-wrap');
  if(!wrap) return;

  // Asegurarse de que existe el canvas (puede haber sido reemplazado por mensaje empty)
  let canvas = document.getElementById('price-chart');
  if(!canvas){
    wrap.innerHTML = '<canvas id="price-chart"></canvas>';
    canvas = document.getElementById('price-chart');
  }

  // Detectar histórico vacío o inválido
  if(!s.sevenDayPoints || s.sevenDayPoints.length === 0){
    wrap.innerHTML = '<div class="chart-empty-state">Datos históricos no disponibles para esta subnet</div>';
    return;
  }

  // Detectar si todos los precios son 0 o null (histórico inútil)
  const validPrices = s.sevenDayPoints.filter(pt => pt.price && pt.price > 0);
  if(validPrices.length === 0){
    wrap.innerHTML = '<div class="chart-empty-state">Esta subnet aún no tiene historial de precios suficiente</div>';
    return;
  }

  // Si solo tenemos 1-2 puntos válidos, también es poco fiable
  if(validPrices.length < 3){
    wrap.innerHTML = '<div class="chart-empty-state">Histórico insuficiente para mostrar gráfica</div>';
    return;
  }

  // Destruir gráfica previa si existe
  if(STATE.chart){
    STATE.chart.destroy();
    STATE.chart = null;
  }

  // Datos según timeframe
  // 7d = todos los puntos
  // 1d = puntos de las últimas 24h (filtrados por timestamp si lo tenemos)
  const allPoints = s.sevenDayPoints;
  let points;
  if(STATE.timeframe === '1d'){
    // Filtrar últimas 24h por timestamp real
    const now = Date.now();
    const dayMs = 24 * 60 * 60 * 1000;
    points = allPoints.filter(pt => pt.time && (now - pt.time.getTime()) <= dayMs);
    // Si no hay timestamps, fallback a los últimos 6 puntos
    if(points.length === 0){
      points = allPoints.slice(-6);
    }
  }else{
    points = allPoints;
  }

  // Construir labels usando timestamps reales si los tenemos
  const labels = points.map(pt => {
    if(!pt.time){
      return '';
    }
    if(STATE.timeframe === '1d'){
      return pt.time.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }
    return pt.time.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
  });

  // Color según tendencia (primer vs último precio)
  const firstPrice = points[0].price;
  const lastPrice = points[points.length - 1].price;
  const isPositive = lastPrice >= firstPrice;
  const lineColor = isPositive ? '#22d87a' : '#ff4d5e';
  const fillColor = isPositive ? 'rgba(34,216,122,0.08)' : 'rgba(255,77,94,0.08)';

  // Convertir precios TAO a USD para mostrar
  const dataUSD = points.map(pt => pt.price * STATE.taoUsd);

  // Guardar timestamps para tooltip
  const tooltipTimes = points.map(pt => pt.time);

  const ctx = canvas.getContext('2d');
  STATE.chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: dataUSD,
        borderColor: lineColor,
        backgroundColor: fillColor,
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        pointHoverRadius: 6,
        pointHoverBackgroundColor: lineColor,
        pointHoverBorderColor: '#fff',
        pointHoverBorderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false,
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(13,15,23,0.95)',
          titleColor: '#a8b2c0',
          bodyColor: '#fff',
          borderColor: 'rgba(0,240,255,0.3)',
          borderWidth: 1,
          padding: 12,
          titleFont: { family: "'Share Tech Mono', monospace", size: 11 },
          bodyFont: { family: "'Orbitron', sans-serif", size: 14, weight: '600' },
          displayColors: false,
          callbacks: {
            title: (items) => {
              if(!items.length) return '';
              const i = items[0].dataIndex;
              const t = tooltipTimes[i];
              if(!t) return items[0].label;
              return t.toLocaleString('es-ES', {
                day: 'numeric',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit'
              });
            },
            label: (ctx) => {
              const v = ctx.parsed.y;
              if(v === 0) return '—';
              if(v < 0.01) return '$' + v.toFixed(5);
              if(v < 1) return '$' + v.toFixed(4);
              return '$' + v.toFixed(2);
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            color: '#6b7385',
            font: { family: "'Share Tech Mono', monospace", size: 10 },
            maxRotation: 0,
            autoSkip: true,
            maxTicksLimit: 6,
          },
          border: { color: 'rgba(0,240,255,0.10)' }
        },
        y: {
          grid: { color: 'rgba(0,240,255,0.05)', drawBorder: false },
          ticks: {
            color: '#6b7385',
            font: { family: "'Share Tech Mono', monospace", size: 10 },
            callback: (v) => {
              if(v === 0) return '$0';
              if(v < 0.01) return '$' + v.toFixed(4);
              if(v < 1) return '$' + v.toFixed(3);
              return '$' + v.toFixed(2);
            }
          },
          border: { display: false }
        }
      }
    }
  });
}

async function init(){
  STATE.netuid = getNetuidFromUrl();

  if(STATE.netuid === null){
    renderError('Falta el parámetro ?id en la URL. Ejemplo: subnet.html?id=64');
    return;
  }

  // Cargar TAO price + datos de subnet + info GitHub en paralelo
  const [_, raw, info] = await Promise.all([
    fetchTaoPrice(),
    fetchSubnetData(STATE.netuid),
    fetchSubnetInfo(),
  ]);

  if(!raw){
    renderError(`No se encontraron datos para la subnet ${STATE.netuid}. Es posible que no exista o no esté activa.`);
    return;
  }

  STATE.info = info;
  STATE.rawData = raw;
  STATE.subnet = parseSubnet(raw);
  renderPage();
}

init();

// Botón "Volver" inteligente: usa history.back() si vienes del propio sitio
function setupSmartBack(){
  const link = document.getElementById('back-link');
  if(!link) return;

  let fromPath = '';
  try { fromPath = sessionStorage.getItem('lastPage') || ''; } catch(e){}
  if(!fromPath && document.referrer){
    try {
      const refUrl = new URL(document.referrer);
      if(refUrl.origin === window.location.origin){
        fromPath = refUrl.pathname.split('/').pop() || 'index.html';
      }
    } catch(e){}
  }

  const labels = {
    'market.html':           '← Volver al Market',
    'aprende.html':          '← Volver a Aprende',
    'index.html':            '← Volver al inicio',
    '':                      '← Volver al inicio',
    'que-es-bittensor.html': '← Volver a la guía',
    'tao.html':              '← Volver a TAO',
  };
  if(fromPath.startsWith('aprende-modulo-')){
    link.textContent = '← Volver al módulo';
  } else if(labels[fromPath] !== undefined){
    link.textContent = labels[fromPath];
  } else if(fromPath){
    link.textContent = '← Volver';
  }

  link.addEventListener('click', function(e){
    if(fromPath && window.history.length > 1){
      e.preventDefault();
      window.history.back();
    }
  });
}

// Guardar dónde estamos para que la próxima página sepa de dónde venimos
window.addEventListener('beforeunload', function(){
  try {
    const here = window.location.pathname.split('/').pop() || 'index.html';
    sessionStorage.setItem('lastPage', here);
  } catch(e){}
});
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'hidden'){
    try {
      const here = window.location.pathname.split('/').pop() || 'index.html';
      sessionStorage.setItem('lastPage', here);
    } catch(e){}
  }
});
</script>


<script>
(async function loadNavTao(){
  const API_BASE = 'https://tao360.qrchd889gj.workers.dev';

    if(!n && n !== 0) return '—';
    if(n < 1) return '$' + n.toFixed(3);
    if(n < 100) return '$' + n.toFixed(2);
    return '$' + Math.round(n).toLocaleString('en-US');
  }
  function fmtPct(v){
    if(v === null || v === undefined || isNaN(v)) return '—';
    return (v > 0 ? '+' : '') + v.toFixed(1) + '%';
  }
  function pctClass(v){
    if(v > 0.001) return 'pos';
    if(v < -0.001) return 'neg';
    return 'zero';
  }
  try{
    const r = await fetch(`${API_BASE}/api/price/latest/v1?asset=tao`);
    const j = await r.json();
    if(j && j.data && j.data[0]){
      const price = parseFloat(j.data[0].price) || 0;
      const change = parseFloat(j.data[0].percent_change_24h) || 0;
      const p = document.getElementById('nav-tao-price');
      const c = document.getElementById('nav-tao-change');
      if(p) p.textContent = fmtUSD(price);
      if(c){
        c.textContent = fmtPct(change);
        c.className = 'nt-change ' + pctClass(change);
      }
    }
  }catch(e){
    console.error('nav-tao load failed', e);
  }
})();
