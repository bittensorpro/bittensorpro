/* =========================================================================
   FORMATTERS
   ========================================================================= */
function fmtPriceUSD(taoPrice){
  const usd = taoPrice * STATE.taoUsd;
  if(usd === 0) return '—';
  if(usd < 0.01) return '$' + usd.toFixed(5);
  if(usd < 1)    return '$' + usd.toFixed(4);
  if(usd < 100)  return '$' + usd.toFixed(2);
  return '$' + usd.toLocaleString('en-US',{maximumFractionDigits:2});
}
function fmtMoneyUSD(taoVal){
  const usd = taoVal * STATE.taoUsd;
  if(usd === 0) return '—';
  if(usd >= 1e9) return '$' + (usd/1e9).toFixed(2) + 'B';
  if(usd >= 1e6) return '$' + (usd/1e6).toFixed(2) + 'M';
  if(usd >= 1e3) return '$' + (usd/1e3).toFixed(2) + 'K';
  return '$' + usd.toFixed(2);
}
function fmtPct(v){
  if(v === null || v === undefined || isNaN(v)) return '—';
  const sign = v > 0 ? '+' : '';
  return sign + v.toFixed(2) + '%';
}
function pctClass(v){
  if(v > 0.001) return 'pos';
  if(v < -0.001) return 'neg';
  return 'zero';
}
function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g,c=>(
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

function getNetuidFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'), 10);
  if(isNaN(id) || id < 0 || id > 256) return null;
  return id;
}

   ========================================================================= */
function parseSubnet(raw){
  // raw viene de TaoSwap /subnets/{id}/ — campos directamente en TAO, sin RAO
  const id = raw.id;
  const def = SUBNET_DEFS[id] || {};
  let symbol = def.symbol || `SN${id}`;
  let name = raw.identity?.name || def.name || raw.name || `Subnet ${id}`;

  // sevenDayPoints se rellena después con fetchSubnetHistory
  const sevenDayPoints = STATE.historyPoints || [];

  return {
    id,
    symbol,
    name,
    logo: raw.identity?.image || raw.identity?.logo_url || raw.identity?.icon || null,
    price:        raw.price || 0,
    marketCap:    raw.market_cap || 0,         // ya en TAO
    volume:       (raw.inflow || 0) + Math.abs(raw.outflow || 0),
    liquidity:    raw.root_in_pool || 0,       // TAO en el pool AMM
    totalAlpha:   raw.total_supply || 0,
    change1h:     raw.price_evolution_h_1  || 0,
    change24h:    raw.price_evolution_h_24 || 0,
    change7d:     raw.price_evolution_d_7  || 0,
    change30d:    raw.price_evolution_d_30 || 0,
    sevenDayPoints,
  };
}

function parseHistory(historyArr){
  // Deriva precio diario de tao_in_pool / alpha_in_pool
  if(!Array.isArray(historyArr) || historyArr.length === 0) return [];
  return historyArr
    .filter(h => h.tao_in_pool > 0 && h.alpha_in_pool > 0)
    .map(h => ({
      price: h.tao_in_pool / h.alpha_in_pool,
      time:  h.date ? new Date(h.date) : null,
    }));
}

/* =========================================================================
   RENDER VALIDADORES
   ========================================================================= */
function shortAddr(addr){
  if(!addr) return '—';
  if(addr.length <= 12) return addr;
  return addr.slice(0, 6) + '…' + addr.slice(-4);
}

function fmtTAO(rawValue){
  // Los valores de stake suelen venir en RAO (10^9). Si parecen demasiado grandes, dividimos.
  let v = parseFloat(rawValue) || 0;
  if(v > 1e12) v = v / 1e9; // viene en rao
  if(v >= 1e6) return (v/1e6).toFixed(2) + 'M τ';
  if(v >= 1e3) return (v/1e3).toFixed(2) + 'K τ';
  if(v >= 1)   return v.toFixed(2) + ' τ';
  if(v > 0)    return v.toFixed(4) + ' τ';
  return '—';
}

function fmtAPY(val){
  // Algunos endpoints devuelven 0.124 (12.4%), otros 12.4. Detectamos.
  let v = parseFloat(val);
  if(isNaN(v) || v === 0) return '—';
  if(Math.abs(v) < 5) v = v * 100; // venía en decimal
  return v.toFixed(1) + '%';
}

function renderValidators(){

  if(!container) return;
  const _t = window.t || (k => k);

  const validators = STATE.validators || [];
  if(validators.length === 0){
    container.innerHTML = `<div class="neuron-empty">${_t('subnet.empty.val')}</div>`;
    return;
  }

  // TaoSwap ya devuelve ordenado por APY desc, tomamos top 15
  const sorted = validators.slice(0, 15);

  const rows = sorted.map((v, i) => {
    const hotkey = v.validator_hotkey || '';
    const name = v.identity?.name || shortAddr(hotkey);
    const stake = parseFloat(v.total_stake_alpha) || parseFloat(v.total_stake) || 0;
    const apy7d = v.apy_7d != null ? parseFloat(v.apy_7d).toFixed(1) + '%' : '—';
    // TaoSwap take ya viene en porcentaje
    const take = v.take != null ? parseFloat(v.take).toFixed(1) + '%' : '—';
    const delegators = v.count_delegators ? v.count_delegators.toLocaleString() : '—';
    const taostatsUrl = hotkey ? `https://taostats.io/hotkey/${hotkey}` : null;

    return `
      <tr>
        <td class="rank">#${i+1}</td>

        <td class="num apy">${apy7d}</td>
        <td class="num">${fmtTAO(stake)}</td>

  container.innerHTML = `

  if(onlyMiners.length === 0) onlyMiners = miners;

    .sort((a, b) => (parseFloat(b.incentive) || 0) - (parseFloat(a.incentive) || 0))

        <td class="num">${incentive}</td>
        <td class="num">${trust}</td>
        <td class="num">${emission}</td>

  container.innerHTML = `

      <table class="neuron-table">
        <thead>
          <tr>
            <th>#</th>
            <th class="num">UID</th>

            <th class="num">${_t('subnet.th.trust')}</th>
            <th class="num">${_t('subnet.th.emission')}</th>
            <th class="num">${_t('subnet.th.daily')}</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function updatePriceChange(){
  const s = STATE.subnet;
  const change = s[`change${STATE.timeframe === '1d' ? '24h' : '7d'}`] || 0;
  const tfLabel = STATE.timeframe === '1d' ? '24h' : '7d';
  const changeEl = document.querySelector('.price-change');
  const labelEl = document.querySelector('.price-change-label');
  if(changeEl){
    changeEl.className = 'price-change ' + pctClass(change);
    changeEl.textContent = fmtPct(change);
  }
  if(labelEl) labelEl.textContent = tfLabel;
}

function renderChart(){
  const s = STATE.subnet;
  const wrap = document.getElementById('chart-wrap');
  if(!wrap) return;

  let canvas = document.getElementById('price-chart');
  if(!canvas){
    wrap.innerHTML = '<canvas id="price-chart"></canvas>';
    canvas = document.getElementById('price-chart');
  }

  const allPoints = (s.sevenDayPoints || []).filter(pt => pt.price && pt.price > 0);

  if(allPoints.length === 0){
    wrap.innerHTML = `<div class="chart-empty-state">${_t('subnet.chart.no_data')}</div>`;
    updateStatBar([]);
    return;
  }

  if(STATE.chart){ STATE.chart.destroy(); STATE.chart = null; }

  // Selección de puntos según timeframe
  // Nota: la API solo tiene datos diarios (1 punto/día), no intradiarios.
  // Para "24h" usamos los últimos 2 días disponibles (ayer→hoy).
  let points;
  if(STATE.timeframe === '1d'){
    const now = Date.now(), twoDaysMs = 864e5 * 2;
    points = allPoints.filter(pt => pt.time && (now - pt.time.getTime()) <= twoDaysMs);
    if(points.length < 2) points = allPoints.slice(-Math.min(2, allPoints.length));
  } else if(STATE.timeframe === '7d'){
    points = allPoints.slice(-Math.min(7, allPoints.length));
  } else {
    points = allPoints;
  }

  const isTAO = STATE.currency === 'TAO';
  const locale = window.getLang && window.getLang() === 'en' ? 'en-US' : 'es-ES';

  const dataValues = points.map(pt => isTAO ? pt.price : pt.price * STATE.taoUsd);
  const firstVal = dataValues[0], lastVal = dataValues[dataValues.length - 1];
  const isPositive = lastVal >= firstVal;
  const lineColor = isPositive ? '#22d87a' : '#ff4d5e';

  // Stat bar: open, close, high, low, change%
  updateStatBar(dataValues, firstVal, lastVal, isPositive);

  const labels = points.map(pt => {
    if(!pt.time) return '';
    if(STATE.timeframe === '1d')
      return pt.time.toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' });
    return pt.time.toLocaleDateString(locale, { day: 'numeric', month: 'short' });
  });

  const tooltipTimes = points.map(pt => pt.time);

  // Gradient fill usando canvas API
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.offsetHeight || 280);
  grad.addColorStop(0,   isPositive ? 'rgba(34,216,122,0.28)' : 'rgba(255,77,94,0.28)');
  grad.addColorStop(0.6, isPositive ? 'rgba(34,216,122,0.06)' : 'rgba(255,77,94,0.06)');
  grad.addColorStop(1,   'rgba(0,0,0,0)');

  const fmtVal = v => {
    if(isTAO){
      if(v < 0.001) return 'τ' + v.toFixed(6);
      if(v < 1)     return 'τ' + v.toFixed(4);
      return 'τ' + v.toFixed(3);
    }
    if(v === 0) return '—';
    if(v < 0.001) return '$' + v.toFixed(6);
    if(v < 0.01)  return '$' + v.toFixed(5);
    if(v < 1)     return '$' + v.toFixed(4);
    if(v < 100)   return '$' + v.toFixed(2);
    return '$' + v.toLocaleString('en-US', {maximumFractionDigits:2});
  };

  STATE.chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: dataValues,
        borderColor: lineColor,
        backgroundColor: grad,
        borderWidth: 2,
        fill: true,
        tension: 0.35,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: lineColor,
        pointHoverBorderColor: '#fff',
        pointHoverBorderWidth: 2,
        segment: {
          borderColor: ctx => lineColor,
        },
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400, easing: 'easeInOutQuart' },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(10,12,20,0.97)',
          titleColor: '#6b7385',
          bodyColor: '#fff',
          borderColor: isPositive ? 'rgba(34,216,122,0.4)' : 'rgba(255,77,94,0.4)',
          borderWidth: 1,
          padding: { top:10, right:14, bottom:10, left:14 },
          titleFont: { family: "'Outfit', sans-serif", size: 10, weight: '400' },
          bodyFont: { family: "'Share Tech Mono', monospace", size: 14 },
          displayColors: false,
          caretSize: 5,
          callbacks: {
            title: items => {
              if(!items.length) return '';
              const t = tooltipTimes[items[0].dataIndex];
              if(!t) return items[0].label;
              return t.toLocaleString(locale, { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
            },
            label: ctx => ' ' + fmtVal(ctx.parsed.y),
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            color: '#4a5263',
            font: { family: "'Outfit', sans-serif", size: 9 },
            maxRotation: 0,
            autoSkip: true,
            maxTicksLimit: STATE.timeframe === '30d' ? 8 : 6,
          },
          border: { color: 'rgba(0,240,255,0.08)' }
        },
        y: {
          position: 'right',
          grid: { color: 'rgba(0,240,255,0.04)' },
          ticks: {
            color: '#4a5263',
            font: { family: "'Share Tech Mono', monospace", size: 9 },
            callback: v => fmtVal(v),
            maxTicksLimit: 5,
          },
          border: { display: false }
        }
      }
    }
  });
}

function updateStatBar(dataValues, firstVal, lastVal, isPositive){
  const bar = document.getElementById('chart-stat-bar');
  if(!bar) return;
  if(!dataValues || dataValues.length === 0){ bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  const isTAO = STATE.currency === 'TAO';
  const sym = isTAO ? 'τ' : '$';
  const hi = Math.max(...dataValues), lo = Math.min(...dataValues);
  const changePct = firstVal > 0 ? ((lastVal - firstVal) / firstVal) * 100 : 0;
  const fmtShort = v => {
    if(isTAO) return sym + (v < 0.01 ? v.toFixed(5) : v < 1 ? v.toFixed(4) : v.toFixed(3));
    if(v < 0.01) return sym + v.toFixed(5);
    if(v < 1)    return sym + v.toFixed(4);
    return sym + v.toFixed(2);
  };
  const sign = changePct > 0 ? '+' : '';
  const cls = changePct > 0.001 ? 'pos' : changePct < -0.001 ? 'neg' : '';
  bar.innerHTML = `
    <div class="chart-stat-item">
      <span class="chart-stat-lbl">${_t('subnet.chart.open')}</span>
      <span class="chart-stat-val">${fmtShort(firstVal)}</span>
    </div>
    <div class="chart-stat-item">
      <span class="chart-stat-lbl">${_t('subnet.chart.close')}</span>
      <span class="chart-stat-val">${fmtShort(lastVal)}</span>
    </div>
    <div class="chart-stat-item">
      <span class="chart-stat-lbl">↑ ${_t('subnet.chart.high')}</span>
      <span class="chart-stat-val pos">${fmtShort(hi)}</span>
    </div>
    <div class="chart-stat-item">
      <span class="chart-stat-lbl">↓ ${_t('subnet.chart.low')}</span>
      <span class="chart-stat-val neg">${fmtShort(lo)}</span>
    </div>
    <div class="chart-stat-item">
      <span class="chart-stat-lbl">${_t('subnet.chart.change')}</span>
      <span class="chart-stat-val ${cls}">${sign}${changePct.toFixed(2)}%</span>
    </div>
  `;
}

async function init(){
  STATE.netuid = getNetuidFromUrl();

  if(STATE.netuid === null){
    renderError(_t('subnet.error_noid'));
    return;
  }

  // Cargar todo en paralelo: precio TAO + datos subnet + info GitHub + historial
  const [_, raw, info, historyArr] = await Promise.all([
    fetchTaoPrice(),
    fetchSubnetData(STATE.netuid),
    fetchSubnetInfo(),
    fetchSubnetHistory(STATE.netuid),
  ]);

  if(!raw){
    renderError(_t('subnet.error_notfound').replace('{id}', STATE.netuid));
    return;
  }

  STATE.info = info;
  STATE.rawData = raw;
  STATE.historyPoints = parseHistory(historyArr);
  STATE.subnet = parseSubnet(raw);
  renderPage();

  // Cargar mineros y validadores progresivamente (ambos gratis desde TaoSwap)
  loadNeurons();
}

async function loadNeurons(){
  const [metagraph, validators] = await Promise.all([
    fetchMetagraph(STATE.netuid),
    fetchValidators(STATE.netuid),
  ]);
  STATE.miners = metagraph || [];
  STATE.validators = validators || [];
  renderMiners();
  renderValidators();
}

init();

document.addEventListener('langchange', () => {
  if(STATE.subnet) renderPage();
  if(STATE.validators.length) renderValidators();
  if(STATE.miners.length) renderMiners();
});

// Botón "Volver" inteligente: usa history.back() si vienes del propio sitio
function setupSmartBack(){
  const link = document.getElementById('back-link');
  if(!link) return;

  let fromPath = '';
  try { fromPath = sessionStorage.getItem('lastPage') || ''; } catch(e){}
  if(!fromPath && document.referrer){
    try {
      const refUrl = new URL(document.referrer);
      if(refUrl.origin === window.location.origin){
        fromPath = refUrl.pathname.split('/').pop() || 'index.html';
      }
    } catch(e){}
  }

  const labels = {
    'market.html':           _t('nav.back.market'),
    'aprende.html':          _t('tao.back.learn'),
    'index.html':            _t('tao.back.home'),
    '':                      _t('tao.back.home'),
    'que-es-bittensor.html': _t('tao.back.guide'),
    'tao.html':              _t('subnet.back.tao'),
  };
  if(fromPath.startsWith('aprende-modulo-')){
    link.textContent = _t('tao.back.module');
  } else if(labels[fromPath] !== undefined){
    link.textContent = labels[fromPath];
  } else if(fromPath){
    link.textContent = _t('nav.back');
  }

  link.addEventListener('click', function(e){
    if(fromPath && window.history.length > 1){
      e.preventDefault();
      window.history.back();
    }
  });
}

// Guardar dónde estamos para que la próxima página sepa de dónde venimos
window.addEventListener('beforeunload', function(){
  try {
    const here = window.location.pathname.split('/').pop() || 'index.html';
    sessionStorage.setItem('lastPage', here);
  } catch(e){}
});
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'hidden'){
    try {
      const here = window.location.pathname.split('/').pop() || 'index.html';
      sessionStorage.setItem('lastPage', here);
    } catch(e){}
  }
});
</script>


<script>
(async function loadNavTao(){
  const API_BASE = 'https://tao360.qrchd889gj.workers.dev';
  function fmtUSD(n){
    if(!n && n !== 0) return '—';
    if(n < 1) return '$' + n.toFixed(3);
    if(n < 100) return '$' + n.toFixed(2);
    return '$' + Math.round(n).toLocaleString('en-US');
  }
  function fmtPct(v){
    if(v === null || v === undefined || isNaN(v)) return '—';
    return (v > 0 ? '+' : '') + v.toFixed(1) + '%';
  }
  function pctClass(v){
    if(v > 0.001) return 'pos';
    if(v < -0.001) return 'neg';
    return 'zero';
  }
  try{
    const r = await fetch(`${API_BASE}/api/price/latest/v1?asset=tao`);
    const j = await r.json();
    if(j && j.data && j.data[0]){
      const price = parseFloat(j.data[0].price) || 0;
      const change = parseFloat(j.data[0].percent_change_24h) || 0;
      const p = document.getElementById('nav-tao-price');
      const c = document.getElementById('nav-tao-change');
      if(p) p.textContent = fmtUSD(price);
      if(c){
        c.textContent = fmtPct(change);
        c.className = 'nt-change ' + pctClass(change);
      }
    }
  }catch(e){
    console.error('nav-tao load failed', e);
  }
})();
</script>
