<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #05060a;
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff2bd6;
    --neon-violet: #8a2bff;
    --neon-amber: #ffb648;
    --grid: rgba(0, 240, 255, 0.20);
    --grid-strong: rgba(0, 240, 255, 0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-0);
    color: #e8f6ff;
    font-family: 'Chakra Petch', sans-serif;
  }

  body { cursor: crosshair; }

  /* Fondo */
  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(1000px 600px at 70% -10%, rgba(138, 43, 255, 0.45), transparent 60%),
      radial-gradient(800px 500px at 10% 110%, rgba(255, 43, 214, 0.30), transparent 60%),
      radial-gradient(600px 400px at 50% 50%, rgba(0, 240, 255, 0.12), transparent 70%),
      linear-gradient(180deg, #02030a 0%, #07091a 50%, #02030a 100%);
    z-index: 0;
  }

  /* Red neuronal + bloques de blockchain — fondo animado discreto */
  #bg-network {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
    opacity: 0.55;
  }

  /* Cuadrícula del piso */
  .floor {
    position: fixed;
    bottom: 0;
    left: 50%;
    width: 300vw;
    height: 60vh;
    transform: translateX(-50%) perspective(500px) rotateX(65deg);
    transform-origin: center top;
    background-image:
      linear-gradient(var(--grid-strong) 2px, transparent 2px),
      linear-gradient(90deg, var(--grid-strong) 2px, transparent 2px);
    background-size: 50px 50px;
    animation: floor-scroll 4s linear infinite;
    mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.9) 30%, rgba(0,0,0,1) 70%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.9) 30%, rgba(0,0,0,1) 70%);
    z-index: 1;
  }
  @keyframes floor-scroll {
    from { background-position: 0 0; }
    to   { background-position: 0 50px; }
  }

  /* Scanlines */
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255, 255, 255, 0.04) 0px,
      rgba(255, 255, 255, 0.04) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Ruido */
  .noise {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 6;
    opacity: 0.08;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>");
  }

  /* Stage */
  .stage {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 4vh 24px 40px;
    text-align: center;
    gap: 14px;
  }

  /* Tag superior */
  .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--neon-cyan);
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid rgba(0, 240, 255, 0.5);
    background: rgba(0, 240, 255, 0.05);
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.15) inset, 0 0 12px rgba(0, 240, 255, 0.2);
    animation: flicker 5s infinite, fade-in 1.2s ease-out 0.1s both;
  }
  .tag .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--neon-cyan);
    margin-right: 10px;
    box-shadow: 0 0 10px var(--neon-cyan);
    animation: blink 1.4s ease-in-out infinite;
    vertical-align: middle;
  }

  /* τ TAU */
  .tau-wrap {
    position: relative;
    line-height: 0.85;
    animation: fade-in 1.4s ease-out 0.3s both;
  }
  .tau {
    font-family: 'Orbitron', 'Times New Roman', serif;
    font-weight: 900;
    font-size: clamp(140px, 22vw, 220px);
    color: #ffffff;
    line-height: 0.85;
    display: block;
    text-shadow:
      0 0 18px rgba(0, 240, 255, 0.95),
      0 0 36px rgba(0, 240, 255, 0.75),
      0 0 60px rgba(138, 43, 255, 0.6),
      0 0 100px rgba(255, 43, 214, 0.5);
    animation: glitch-shift 7s infinite;
  }

  .tau-wrap .ghost {
    position: absolute;
    top: 0; left: 0;
    right: 0;
    font-family: 'Orbitron', 'Times New Roman', serif;
    font-weight: 900;
    font-size: clamp(140px, 22vw, 220px);
    line-height: 0.85;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0.7;
  }
  .tau-wrap .ghost.cyan {
    color: var(--neon-cyan);
    transform: translate(-4px, 0);
    animation: glitch-1 3.6s infinite steps(1);
  }
  .tau-wrap .ghost.magenta {
    color: var(--neon-magenta);
    transform: translate(4px, 0);
    animation: glitch-2 3.6s infinite steps(1);
  }

  /* Título */
  .title {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: clamp(28px, 6vw, 64px);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #f4faff;
    text-shadow: 0 0 18px rgba(0, 240, 255, 0.4);
    animation: fade-in 1.2s ease-out 0.6s both;
  }
  .title .pro {
    color: var(--neon-magenta);
    font-style: italic;
    text-shadow:
      0 0 10px rgba(255, 43, 214, 0.9),
      0 0 28px rgba(255, 43, 214, 0.6);
  }

  .line {
    width: clamp(160px, 32vw, 320px);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-magenta), transparent);
    box-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
    animation: fade-in 1.2s ease-out 0.9s both;
  }

  .soon {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(13px, 1.8vw, 18px);
    letter-spacing: 0.6em;
    color: var(--neon-cyan);
    text-transform: uppercase;
    padding-left: 0.6em;
    text-shadow: 0 0 14px rgba(0, 240, 255, 0.8);
    animation: fade-in 1.2s ease-out 1.1s both, flicker 5s infinite;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .soon .bracket { color: var(--neon-magenta); }
  .soon .cursor {
    display: inline-block;
    width: 0.6em;
    height: 1.1em;
    background: var(--neon-cyan);
    box-shadow: 0 0 10px var(--neon-cyan);
    animation: blink 1s steps(1) infinite;
    margin-left: 6px;
  }

  /* === BOTÓN PREVIEW === */
  .preview-btn {
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 14px 26px;
    background: rgba(0, 240, 255, 0.05);
    border: 1px solid rgba(0, 240, 255, 0.5);
    border-radius: 4px;
    color: #f4faff;
    text-decoration: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: fade-in 1.2s ease-out 1.4s both;
    box-shadow:
      0 0 0 0 rgba(0, 240, 255, 0.4),
      inset 0 0 20px rgba(0, 240, 255, 0.04);
    text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
  }

  .preview-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(0, 240, 255, 0.15) 50%,
      transparent 100%);
    transition: left 0.6s ease;
  }

  .preview-btn:hover {
    background: rgba(0, 240, 255, 0.12);
    border-color: var(--neon-cyan);
    box-shadow:
      0 0 24px rgba(0, 240, 255, 0.4),
      inset 0 0 24px rgba(0, 240, 255, 0.08);
    transform: translateY(-1px);
  }
  .preview-btn:hover::before { left: 100%; }
  .preview-btn:active { transform: translateY(0); }

  .preview-btn .arrow {
    color: var(--neon-magenta);
    font-size: 16px;
    text-shadow: 0 0 8px rgba(255, 43, 214, 0.8);
    transition: transform 0.3s ease;
  }
  .preview-btn:hover .arrow {
    transform: translateX(4px);
  }

  .preview-btn .live-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--neon-cyan);
    letter-spacing: 0.2em;
    padding: 3px 8px;
    background: rgba(0, 240, 255, 0.08);
    border: 1px solid rgba(0, 240, 255, 0.3);
    border-radius: 2px;
    margin-right: -8px;
  }
  .preview-btn .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--neon-cyan);
    box-shadow: 0 0 8px var(--neon-cyan);
    animation: blink 1.4s ease-in-out infinite;
  }

  /* Enlace secundario "Aprender" */
  .learn-link {
    margin-top: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(0, 240, 255, 0.7);
    text-decoration: none;
    text-transform: uppercase;
    border-bottom: 1px dashed rgba(0, 240, 255, 0.3);
    padding-bottom: 2px;
    transition: all 0.2s;
    animation: fade-in 1.2s ease-out 1.7s both;
  }
  .learn-link:hover {
    color: var(--neon-cyan);
    border-bottom-color: var(--neon-cyan);
    text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
  }

  /* HUD esquinas */
  .hud-corner {
    position: fixed;
    width: 26px; height: 26px;
    border: 1px solid var(--neon-cyan);
    z-index: 4;
    opacity: 0.7;
  }
  .hud-corner.tl { top: 14px; left: 14px; border-right: none; border-bottom: none; }
  .hud-corner.tr { top: 14px; right: 14px; border-left: none; border-bottom: none; }
  .hud-corner.bl { bottom: 14px; left: 14px; border-right: none; border-top: none; }
  .hud-corner.br { bottom: 14px; right: 14px; border-left: none; border-top: none; }

  /* Footer */
  .hud {
    position: fixed;
    bottom: 22px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 30px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(0, 240, 255, 0.65);
    z-index: 4;
    text-transform: uppercase;
  }

  /* Animaciones */
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.15; }
  }
  @keyframes flicker {
    0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
    20%, 24%, 55% { opacity: 0.55; }
  }
  @keyframes glitch-shift {
    0%, 92%, 100% { transform: translate(0, 0); }
    93% { transform: translate(-2px, 1px); }
    94% { transform: translate(2px, -1px); }
    95% { transform: translate(-1px, 2px); }
    96% { transform: translate(1px, -2px); }
    97% { transform: translate(0, 0); }
  }
  @keyframes glitch-1 {
    0%, 100% { clip-path: inset(0 0 0 0); }
    20%      { clip-path: inset(10% 0 60% 0); }
    40%      { clip-path: inset(45% 0 30% 0); }
    60%      { clip-path: inset(75% 0 5% 0); }
    80%      { clip-path: inset(20% 0 50% 0); }
  }
  @keyframes glitch-2 {
    0%, 100% { clip-path: inset(0 0 0 0); }
    20%      { clip-path: inset(60% 0 10% 0); }
    40%      { clip-path: inset(25% 0 45% 0); }
    60%      { clip-path: inset(5% 0 75% 0); }
    80%      { clip-path: inset(50% 0 20% 0); }
  }

  @media (max-width: 480px) {
    .tag { font-size: 10px; letter-spacing: 0.3em; padding: 7px 14px; }
    .soon { letter-spacing: 0.45em; padding-left: 0.45em; }
    .hud { font-size: 8px; padding: 0 18px; }
    .preview-btn {
      padding: 12px 20px;
      font-size: 11px;
      letter-spacing: 0.18em;
      gap: 10px;
    }
    .preview-btn .live-indicator { font-size: 9px; padding: 2px 6px; }
  }

  /* ===== TILES ===== */
  .tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: min(440px, 88vw);
    margin: 18px auto 0;
    z-index: 5;
    position: relative;
  }
  .tile {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 18px 12px 16px;
    text-decoration: none;
    color: inherit;
    background: rgba(13, 15, 23, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(0, 240, 255, 0.22);
    border-radius: 8px;
    transition: all 0.2s ease;
    overflow: hidden;
    min-height: 120px;
  }
  .tile:hover {
    border-color: rgba(0, 240, 255, 0.7);
    background: rgba(0, 240, 255, 0.06);
    box-shadow: 0 0 24px rgba(0, 240, 255, 0.20), inset 0 0 16px rgba(0, 240, 255, 0.04);
    transform: translateY(-2px);
  }
  .tile:active {
    transform: translateY(0);
  }
  /* Iconos SVG */
  svg.tile-icon {
    width: 26px;
    height: 26px;
    color: var(--cyan);
    margin-bottom: 10px;
    filter: drop-shadow(0 0 6px rgba(0, 240, 255, 0.4));
    transition: color 0.2s, filter 0.2s;
  }
  .tile:hover svg.tile-icon {
    filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.7));
  }
  /* Icono τ del tile TAO (carácter de texto, no SVG) */
  .tile-icon-tau {
    font-family: 'Times New Roman', 'Times', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 32px;
    line-height: 1;
    color: var(--cyan);
    margin-bottom: 8px;
    text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    transition: text-shadow 0.2s;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tile:hover .tile-icon-tau {
    text-shadow: 0 0 14px rgba(0, 240, 255, 0.8);
  }
  .tile-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-shadow: 0 0 8px rgba(0, 240, 255, 0.25);
  }
  .tile-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: #a8b2c0;
    text-transform: uppercase;
    text-align: center;
  }
  /* Indicador LIVE en el tile de Market */
  .tile-live {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.16em;
    color: #22d87a;
    text-transform: uppercase;
  }
  .tile-live-dot {
    width: 5px; height: 5px;
    background: #22d87a;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(34, 216, 122, 0.8);
    animation: tile-live-pulse 1.6s ease-in-out infinite;
  }
  @keyframes tile-live-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }
  /* Tile especial de TAO con precio */
  .tile-tao-price {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-variant-numeric: tabular-nums;
    margin-top: 4px;
    width: 100%;
  }
  .tile-tao-price > span:first-child {
    font-size: 14px;
    font-weight: 500;
    color: #e8f0f5;
    letter-spacing: 0.04em;
  }
  .tile-tao-change {
    font-size: 10px;
    letter-spacing: 0.02em;
  }
  .tile-tao-change.pos { color: #22d87a; }
  .tile-tao-change.neg { color: #ff4d5e; }
  .tile-tao-change.zero { color: #6b7385; }
  /* Esquinas estilo HUD */
  .tile-corner {
    position: absolute;
    width: 7px;
    height: 7px;
    border: 1px solid rgba(0, 240, 255, 0.55);
    transition: border-color 0.2s;
  }
  .tile-corner.tl { top: 5px; left: 5px; border-right: none; border-bottom: none; }
  .tile-corner.tr { top: 5px; right: 5px; border-left: none; border-bottom: none; }
  .tile-corner.bl { bottom: 5px; left: 5px; border-right: none; border-top: none; }
  .tile-corner.br { bottom: 5px; right: 5px; border-left: none; border-top: none; }
  .tile:hover .tile-corner {
    border-color: var(--cyan);
  }

  /* Móvil */
  @media (max-width: 480px) {
    .tiles {
      width: min(340px, 92vw);
      gap: 10px;
      margin-top: 20px;
    }
    .tile {
      min-height: 102px;
      padding: 14px 10px 12px;
    }

  <script>
  // ===== Cargar precio TAO en el tile =====
  (async function loadTileTao(){
    const API_BASE = 'https://tao360.qrchd889gj.workers.dev';
    function fmtUSD(n){
      if(!n && n !== 0) return '—';
      if(n < 1) return '$' + n.toFixed(3);
      if(n < 100) return '$' + n.toFixed(2);
      return '$' + Math.round(n).toLocaleString('en-US');
    }
    function fmtPct(v){
      if(v === null || v === undefined || isNaN(v)) return '—';
      return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
    }
    function pctClass(v){
      if(v > 0.001) return 'pos';
      if(v < -0.001) return 'neg';
      return 'zero';
    }
    try{
      const r = await fetch(`${API_BASE}/api/price/latest/v1?asset=tao`);
      const j = await r.json();
      if(j && j.data && j.data[0]){
        const price = parseFloat(j.data[0].price) || 0;
        const change = parseFloat(j.data[0].percent_change_24h) || 0;
        const p = document.getElementById('tile-tao-price');
        const c = document.getElementById('tile-tao-change');
        if(p) p.textContent = fmtUSD(price);
        if(c){
          c.textContent = fmtPct(change);
          c.className = 'tile-tao-change ' + pctClass(change);
        }
      }
    }catch(e){
      console.error('Tile TAO load failed', e);
    }
  })();
  </script>

  <script>
  // ===== FONDO ANIMADO: red neuronal + bloques blockchain =====
  (function(){
    const canvas = document.getElementById('bg-network');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');

    // ----- Configuración general -----
    const isMobile = window.innerWidth < 720;
    const NODE_COUNT = isMobile ? 28 : 55;
    const CONNECTION_DIST = isMobile ? 130 : 160;
    const BLOCK_INTERVAL_MS = isMobile ? 5000 : 3500;

    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let w = 0, h = 0;
    let nodes = [];
    let blocks = [];
    let lastBlockTime = 0;
    let running = true;

    // ----- Resize -----
    function resize(){
      w = canvas.clientWidth = window.innerWidth;
      h = canvas.clientHeight = window.innerHeight;
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // ----- Inicialización de nodos -----
    function initNodes(){
      nodes = [];
      for(let i = 0; i < NODE_COUNT; i++){
        nodes.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.18,
          vy: (Math.random() - 0.5) * 0.18,
          r: 1 + Math.random() * 1.2,
        });
      }
    }

    // ----- Crear bloque de blockchain -----
    function createBlock(){
      const size = 14 + Math.random() * 8;
      const lane = Math.random() < 0.5 ? 'top' : 'bottom';
      const yBase = lane === 'top' ? 60 + Math.random() * 80 : h - 100 - Math.random() * 80;
      blocks.push({
        x: w + size,
        y: yBase,
        size,
        speed: 0.35 + Math.random() * 0.25,
        opacity: 0,
        targetOpacity: 0.45 + Math.random() * 0.25,
        prev: blocks.length > 0 ? blocks[blocks.length - 1] : null,
      });
      // Limitar la cadena activa para no saturar
      if(blocks.length > 8){
        // Cuando hay muchos, los más antiguos ya estarán fuera de pantalla
        blocks = blocks.filter(b => b.x > -size * 2);
      }
    }

    // ----- Update + Draw -----
    function step(now){
      if(!running){ return; }
      ctx.clearRect(0, 0, w, h);

      // Update nodes
      for(const n of nodes){
        n.x += n.vx;
        n.y += n.vy;
        if(n.x < 0 || n.x > w) n.vx *= -1;
        if(n.y < 0 || n.y > h) n.vy *= -1;
      }

      // Draw connections (lines)
      ctx.lineWidth = 1;
      for(let i = 0; i < nodes.length; i++){
        for(let j = i + 1; j < nodes.length; j++){
          const a = nodes[i], b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < CONNECTION_DIST){
            const opacity = (1 - dist / CONNECTION_DIST) * 0.25;
            ctx.strokeStyle = `rgba(0, 240, 255, ${opacity})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      // Draw nodes
      for(const n of nodes){
        ctx.fillStyle = 'rgba(0, 240, 255, 0.55)';
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fill();
      }

      // Add new block periodically
      if(now - lastBlockTime > BLOCK_INTERVAL_MS){
        createBlock();
        lastBlockTime = now;
      }

      // Update + Draw blocks (chain)
      for(let i = blocks.length - 1; i >= 0; i--){
        const b = blocks[i];
        b.x -= b.speed;
        // Fade in
        if(b.opacity < b.targetOpacity) b.opacity += 0.012;

        // Línea conectando con el anterior (cadena)
        if(b.prev && b.prev.x > -b.size && b.opacity > 0.05){
          const lineOpacity = Math.min(b.opacity, b.prev.opacity || 0) * 0.6;
          ctx.strokeStyle = `rgba(255, 43, 214, ${lineOpacity})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(b.x + b.size/2, b.y);
          ctx.lineTo(b.prev.x - b.prev.size/2, b.prev.y);
          ctx.stroke();
        }

        // El bloque (silueta vacía)
        ctx.strokeStyle = `rgba(255, 43, 214, ${b.opacity})`;
        ctx.lineWidth = 1.2;
        ctx.strokeRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);

        // Un punto pequeño en el centro (anclaje visual)
        ctx.fillStyle = `rgba(255, 43, 214, ${b.opacity * 0.7})`;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 1.2, 0, Math.PI * 2);
        ctx.fill();

        // Eliminar si está fuera de pantalla
        if(b.x < -b.size * 2){
          blocks.splice(i, 1);
        }
      }

      requestAnimationFrame(step);
    }

    // ----- Pause cuando la pestaña no está visible -----
    document.addEventListener('visibilitychange', function(){
      running = (document.visibilityState === 'visible');
      if(running) requestAnimationFrame(step);
    });

    // ----- Iniciar -----
    window.addEventListener('resize', () => {
      resize();
      initNodes();
    });

    resize();
    initNodes();
    requestAnimationFrame(step);
  })();
  </script>


<script>
// Guardar esta página en sessionStorage para el botón "Volver" inteligente
(function(){
  function savePage(){
    try {
      const here = window.location.pathname.split('/').pop() || 'index.html';
      sessionStorage.setItem('lastPage', here);
    } catch(e){}
  }
  window.addEventListener('beforeunload', savePage);
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'hidden') savePage();
  });
  // También guardar cuando hacen click en cualquier link interno
  document.addEventListener('click', function(e){
    const a = e.target.closest('a[href]');
    if(a && a.getAttribute('href') && !a.getAttribute('href').startsWith('http')){
      savePage();
    }
  }, true);
})();
</script>
