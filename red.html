<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Estado de la red Bittensor · Bittensor Pro — Supply, staking, holders en vivo</title>
<meta name="description" content="Dashboard en vivo de la red Bittensor: supply emitido, TAO en staking, cuentas, holders, transferencias y subnets activas. Datos oficiales de Taostats." />
<link rel="canonical" href="https://bittensor.pro/red.html" />
<meta property="og:title" content="Estado de la red Bittensor — Dashboard en vivo" />
<meta property="og:description" content="Supply, staking, holders, subnets — todo en una vista, en tiempo real." />
<meta property="og:type" content="website" />
<meta property="og:locale" content="es_ES" />
<meta property="og:url" content="https://bittensor.pro/red.html" />

<style>
:root{
  --bg:#05060a;--bg-2:#0d0f17;--bg-3:#141826;
  --border:rgba(0,240,255,0.10);--border-2:rgba(0,240,255,0.22);
  --text:#e8f0f5;--text-muted:#a8b2c0;--text-dim:#6b7385;--text-faint:#4a5263;
  --cyan:#00f0ff;--magenta:#ff2bd6;--green:#22d87a;--red:#ff4d5e;--amber:#ffb84d;
  --max-width:1100px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Chakra Petch',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;line-height:1.6;
  overflow-x:hidden;min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,184,77,0.05), transparent 60%),
    radial-gradient(ellipse 50% 35% at 50% 100%, rgba(0,240,255,0.03), transparent 60%);
  pointer-events:none;z-index:0;
}

/* TOPBAR (mismo que en herramientas.html) */
.topbar{
  position:sticky;top:0;z-index:50;padding:12px 20px;
  padding-top:calc(12px + env(safe-area-inset-top));
  background:rgba(5,6,10,0.85);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
.brand-logo{
  width:32px;height:32px;border:1px solid var(--cyan);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:900;color:var(--cyan);
  font-size:14px;box-shadow:0 0 12px rgba(0,240,255,0.18);
}
.brand-name{font-family:'Orbitron',sans-serif;font-weight:700;font-size:15px;line-height:1}
.brand-name em{font-style:italic;color:var(--magenta);font-weight:700}
.topbar-right{display:flex;gap:8px;align-items:center}
.topbar-right a{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:0.12em;color:var(--text-muted);
  padding:6px 10px;border:1px solid transparent;border-radius:6px;
  text-transform:uppercase;text-decoration:none;transition:all 0.15s;
}
.topbar-right a:hover{color:var(--amber);border-color:var(--border-2)}
.topbar-right a.active{color:var(--amber);border-color:rgba(255,184,77,0.4)}
@media (max-width:600px){
  .topbar-right a{display:none}
  .topbar-right a.active{display:inline-block}
}

.back-bar{
  max-width:var(--max-width);margin:0 auto;
  padding:18px 20px 0;position:relative;z-index:2;
}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Share Tech Mono',monospace;font-size:11px;
  color:var(--amber);letter-spacing:0.12em;
  text-transform:uppercase;text-decoration:none;padding:6px 0;
}
.back-link:hover{opacity:0.75}

.hero{
  max-width:var(--max-width);margin:0 auto;
  padding:24px 20px 32px;position:relative;z-index:2;
}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'Share Tech Mono',monospace;font-size:11px;
  letter-spacing:0.22em;color:var(--amber);
  text-transform:uppercase;margin-bottom:14px;
  padding:5px 12px;border:1px solid var(--amber);
  background:rgba(255,184,77,0.06);border-radius:14px;
}
.eyebrow .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--amber);box-shadow:0 0 8px var(--amber);
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:0.5;transform:scale(0.85)}
  50%{opacity:1;transform:scale(1.1)}
}
h1{
  font-family:'Fraunces',serif;font-style:italic;font-weight:600;
  font-size:clamp(34px,5.5vw,48px);line-height:1.1;
  letter-spacing:-0.02em;margin-bottom:12px;
}
h1 strong{
  font-style:normal;color:var(--amber);
  text-shadow:0 0 24px rgba(255,184,77,0.35);
}
.hero-sub{
  color:var(--text-muted);font-size:16px;line-height:1.6;
  max-width:600px;
}
.updated{
  display:inline-block;margin-top:14px;
  font-family:'Share Tech Mono',monospace;font-size:11px;
  color:var(--text-faint);letter-spacing:0.12em;
}

.content{
  max-width:var(--max-width);margin:0 auto;
  padding:20px 20px 60px;position:relative;z-index:2;
}

/* KPI HERO ROW (las 3 más importantes en grande) */
.kpi-hero{
  display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:30px;
}
@media (min-width:760px){
  .kpi-hero{grid-template-columns:repeat(3,1fr);gap:18px}
}
.kpi-hero-card{
  background:linear-gradient(135deg,rgba(255,184,77,0.06),rgba(0,240,255,0.02));
  border:1px solid var(--border-2);
  border-left:3px solid var(--amber);
  border-radius:12px;padding:22px 24px;
}
.kpi-hero-label{
  font-family:'Share Tech Mono',monospace;font-size:11px;
  letter-spacing:0.22em;color:var(--amber);
  text-transform:uppercase;margin-bottom:10px;
}
.kpi-hero-value{
  font-family:'Orbitron',sans-serif;font-weight:700;
  font-size:clamp(26px,4vw,34px);color:var(--text);
  line-height:1.1;font-variant-numeric:tabular-nums;
  margin-bottom:6px;
}
.kpi-hero-sub{
  color:var(--text-muted);font-size:13px;
  font-family:'Share Tech Mono',monospace;letter-spacing:0.04em;
}
.kpi-hero-bar{
  margin-top:14px;height:4px;background:rgba(0,240,255,0.08);
  border-radius:2px;overflow:hidden;
}
.kpi-hero-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--amber),var(--cyan));
  border-radius:2px;transition:width 0.6s ease;
}

/* SECTION HEADERS */
.section-label{
  font-family:'Share Tech Mono',monospace;font-size:11px;
  letter-spacing:0.22em;color:var(--text-faint);
  text-transform:uppercase;margin:30px 0 14px;
}

/* KPI GRID (las secundarias en mosaico) */
.kpi-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
}
@media (min-width:760px){
  .kpi-grid{grid-template-columns:repeat(4,1fr);gap:14px}
}
.kpi-cell{
  background:var(--bg-2);border:1px solid var(--border-2);
  border-radius:10px;padding:16px 18px;
}
.kpi-cell-label{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:0.18em;color:var(--text-dim);
  text-transform:uppercase;margin-bottom:8px;
}
.kpi-cell-value{
  font-family:'Orbitron',sans-serif;font-weight:700;
  font-size:clamp(18px,2.8vw,22px);color:var(--text);
  line-height:1.2;font-variant-numeric:tabular-nums;
}
.kpi-cell-sub{
  color:var(--text-muted);font-size:12px;
  font-family:'Share Tech Mono',monospace;
  margin-top:4px;letter-spacing:0.04em;
}

/* DESTACADO: SUPPLY PROGRESS */
.supply-card{
  background:var(--bg-2);border:1px solid var(--border-2);
  border-radius:12px;padding:24px;margin-top:14px;
}
.supply-title{
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:18px;
  color:var(--text);margin-bottom:6px;letter-spacing:0.01em;
}
.supply-desc{
  color:var(--text-muted);font-size:13px;
  font-family:'Share Tech Mono',monospace;
  letter-spacing:0.04em;margin-bottom:18px;
}
.supply-bar-outer{
  position:relative;height:30px;
  background:rgba(0,240,255,0.06);border-radius:6px;
  overflow:hidden;border:1px solid var(--border);
}
.supply-bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--amber) 0%,var(--cyan) 100%);
  border-radius:6px;transition:width 0.8s ease;position:relative;
}
.supply-bar-label{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:13px;
  color:var(--text);text-shadow:0 1px 3px rgba(0,0,0,0.6);
  letter-spacing:0.04em;
}
.supply-marks{
  display:flex;justify-content:space-between;
  margin-top:10px;color:var(--text-faint);
  font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:0.06em;
}

/* INFO FOOTER */
.info-card{
  background:var(--bg-2);border:1px solid var(--border-2);
  border-left:3px solid var(--cyan);
  border-radius:10px;padding:18px 22px;margin-top:32px;
}
.info-card-label{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:0.22em;color:var(--cyan);
  text-transform:uppercase;margin-bottom:8px;
}
.info-card p{
  color:var(--text-muted);font-size:13.5px;line-height:1.65;
}
.info-card a{color:var(--cyan);text-decoration:none}

/* STATES */
.loading{padding:40px 20px;text-align:center;color:var(--text-faint);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase}
.loading .ld{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:8px;animation:pulse 1.5s ease-in-out infinite}
.error{padding:32px 20px;text-align:center;color:var(--red);font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:0.1em}

footer{
  border-top:1px solid var(--border);
  padding:30px 20px calc(30px + env(safe-area-inset-bottom));
  text-align:center;font-family:'Share Tech Mono',monospace;
  font-size:10px;letter-spacing:0.2em;color:var(--text-faint);
  text-transform:uppercase;position:relative;z-index:2;margin-top:40px;
}
footer a{color:var(--amber);text-decoration:none}

@media (max-width:600px){
  .hero{padding:20px 16px 24px}
  .content{padding:16px 16px 40px}
  .kpi-hero-card{padding:18px 20px}
  .supply-card{padding:20px}
}
</style>
<script src="/js/api-cache.js"></script>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="brand">
    <div class="brand-logo">τ</div>
    <div class="brand-name">Bittensor <em>Pro</em></div>
  </a>
  <div class="topbar-right">
    <a href="market.html">Market</a>
    <a href="aprende.html">Aprende</a>
    <a href="herramientas.html" class="active">Herramientas</a>
  </div>
</header>

<div class="back-bar">
  <a href="herramientas.html" class="back-link">← Volver a herramientas</a>
</div>

<section class="hero">
  <div class="eyebrow"><span class="dot"></span>Dashboard · En vivo</div>
  <h1>Estado de la <strong>red</strong></h1>
  <p class="hero-sub">Métricas globales de la blockchain Bittensor en tiempo real. Datos directos del nodo via Taostats.</p>
  <div class="updated" id="updated">Cargando…</div>
</section>

<main class="content" id="content">
  <div class="loading">
    <span class="ld"></span>Consultando la red…
  </div>
</main>

<footer>
  <a href="index.html">Bittensor Pro</a> · 2026 · No es consejo financiero
</footer>

<script>
const API_BASE = 'https://tao360.qrchd889gj.workers.dev';
const RAO = 1e9;
const SUPPLY_MAX = 21_000_000;

const STATE = {
  stats: null,
  taoPrice: 0,
};

/* ----------- FETCH ----------- */
async function fetchStats(){
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 10000);
    const r = await fetch(`${API_BASE}/api/stats/latest/v1`, { signal: ctrl.signal });
    clearTimeout(tid);
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    return (j && j.data && j.data[0]) ? j.data[0] : null;
  } catch(e){
    console.error('Error fetching stats', e);
    return null;
  }
}

async function fetchTaoPrice(){
  try {
    const j = await fetchTao('/api/price/latest/v1?asset=tao');
    return (j && j.data && j.data[0]) ? parseFloat(j.data[0].price) : 0;
  } catch(e){
    return 0;
  }
}

/* ----------- FORMATTERS ----------- */
function rao(v){ return parseFloat(v) / RAO; }

function fmtTAO(v){
  const n = rao(v);
  if(!isFinite(n) || n === 0) return '0 τ';
  if(n >= 1e6) return (n/1e6).toFixed(2) + 'M τ';
  if(n >= 1e3) return (n/1e3).toFixed(2) + 'K τ';
  return n.toFixed(2) + ' τ';
}

function fmtUSD(taoVal, price){
  const usd = rao(taoVal) * price;
  if(!isFinite(usd) || usd === 0) return '—';
  if(usd >= 1e9) return '$' + (usd/1e9).toFixed(2) + 'B';
  if(usd >= 1e6) return '$' + (usd/1e6).toFixed(2) + 'M';
  if(usd >= 1e3) return '$' + (usd/1e3).toFixed(2) + 'K';
  return '$' + usd.toFixed(2);
}

function fmtNum(v){
  const n = parseInt(v, 10);
  if(!isFinite(n)) return '—';
  return n.toLocaleString('es-ES');
}

function fmtPct(num, den){
  const a = parseFloat(num), b = parseFloat(den);
  if(!isFinite(a) || !isFinite(b) || b === 0) return '—';
  return ((a/b)*100).toFixed(1) + '%';
}

/* ----------- RENDER ----------- */
function render(){
  const s = STATE.stats;
  const price = STATE.taoPrice;

  if(!s){
    document.getElementById('content').innerHTML =
      '<div class="error">No se pudieron cargar los datos de la red. Por favor recarga la página en unos segundos.</div>';
    return;
  }

  // Supply progress
  const issuedTao = rao(s.issued);
  const supplyPct = (issuedTao / SUPPLY_MAX) * 100;

  // Block age
  let blockAgo = '';
  if(s.timestamp){
    const diff = Date.now() - new Date(s.timestamp).getTime();
    const mins = Math.floor(diff / 60000);
    if(mins < 1) blockAgo = 'hace menos de 1 min';
    else if(mins < 60) blockAgo = `hace ${mins} min`;
    else blockAgo = `hace ${Math.floor(mins/60)}h ${mins%60}m`;
  }
  document.getElementById('updated').textContent =
    `Bloque #${fmtNum(s.block_number)} · ${blockAgo}`;

  const stakedPct = fmtPct(s.staked, s.issued);
  const stakedAlphaPct = fmtPct(s.staked_alpha, s.staked);
  const stakedRootPct = fmtPct(s.staked_root, s.staked);
  const freePct = fmtPct(s.free, s.issued);

  const html = `
    <!-- Hero KPIs -->
    <div class="kpi-hero">

      <div class="kpi-hero-card">
        <div class="kpi-hero-label">// Supply emitido</div>
        <div class="kpi-hero-value">${fmtTAO(s.issued)}</div>
        <div class="kpi-hero-sub">${supplyPct.toFixed(2)}% del máximo (21M τ)</div>
        <div class="kpi-hero-bar"><div class="kpi-hero-bar-fill" style="width:${supplyPct}%"></div></div>
      </div>

      <div class="kpi-hero-card">
        <div class="kpi-hero-label">// En staking</div>
        <div class="kpi-hero-value">${fmtTAO(s.staked)}</div>
        <div class="kpi-hero-sub">${stakedPct} del supply ${price ? '· ' + fmtUSD(s.staked, price) : ''}</div>
        <div class="kpi-hero-bar"><div class="kpi-hero-bar-fill" style="width:${(parseFloat(s.staked)/parseFloat(s.issued))*100}%"></div></div>
      </div>

      <div class="kpi-hero-card">
        <div class="kpi-hero-label">// Subnets activas</div>
        <div class="kpi-hero-value">${fmtNum(s.subnets)}</div>
        <div class="kpi-hero-sub">Registrar nueva: ${fmtTAO(s.subnet_registration_cost)}</div>
      </div>

    </div>

    <!-- Supply Progress Big -->
    <div class="section-label">// Camino hacia los 21M</div>
    <div class="supply-card">
      <div class="supply-title">Progreso del supply</div>
      <div class="supply-desc">Total emitido frente al límite máximo absoluto de la red.</div>
      <div class="supply-bar-outer">
        <div class="supply-bar-fill" style="width:${supplyPct}%"></div>
        <div class="supply-bar-label">${issuedTao.toFixed(0).toLocaleString('es-ES')} / 21.000.000 τ · ${supplyPct.toFixed(2)}%</div>
      </div>
      <div class="supply-marks">
        <span>0</span>
        <span>5.25M (½ halving 1)</span>
        <span>10.5M (halving 1) ✓</span>
        <span>15.75M (halving 2)</span>
        <span>21M</span>
      </div>
    </div>

    <!-- Distribución del supply -->
    <div class="section-label">// Distribución del supply</div>
    <div class="kpi-grid">
      <div class="kpi-cell">
        <div class="kpi-cell-label">Stake en alpha (subnets)</div>
        <div class="kpi-cell-value">${fmtTAO(s.staked_alpha)}</div>
        <div class="kpi-cell-sub">${stakedAlphaPct} del total staked</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-cell-label">Stake en root</div>
        <div class="kpi-cell-value">${fmtTAO(s.staked_root)}</div>
        <div class="kpi-cell-sub">${stakedRootPct} del total staked</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-cell-label">TAO libre</div>
        <div class="kpi-cell-value">${fmtTAO(s.free)}</div>
        <div class="kpi-cell-sub">${freePct} sin staking</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-cell-label">Subnet locked</div>
        <div class="kpi-cell-value">${fmtTAO(s.subnet_locked)}</div>
        <div class="kpi-cell-sub">Reservado por subnets</div>
      </div>
    </div>

    <!-- Participantes -->
    <div class="section-label">// Participantes</div>
    <div class="kpi-grid">
      <div class="kpi-cell">
        <div class="kpi-cell-label">Cuentas totales</div>
        <div class="kpi-cell-value">${fmtNum(s.accounts)}</div>
        <div class="kpi-cell-sub">Direcciones SS58 únicas</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-cell-label">Holders de TAO</div>
        <div class="kpi-cell-value">${fmtNum(s.balance_holders)}</div>
        <div class="kpi-cell-sub">Con balance &gt; 0</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-cell-label">Transferencias</div>
        <div class="kpi-cell-value">${fmtNum(s.transfers)}</div>
        <div class="kpi-cell-sub">Históricas totales</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-cell-label">Extrinsics</div>
        <div class="kpi-cell-value">${fmtNum(s.extrinsics)}</div>
        <div class="kpi-cell-sub">Transacciones on-chain</div>
      </div>
    </div>

    <!-- Valoración USD -->
    ${price ? `
    <div class="section-label">// Valoración en USD</div>
    <div class="kpi-grid">
      <div class="kpi-cell">
        <div class="kpi-cell-label">Precio TAO</div>
        <div class="kpi-cell-value">$${price.toFixed(2)}</div>
        <div class="kpi-cell-sub">Spot actual</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-cell-label">Market cap</div>
        <div class="kpi-cell-value">${fmtUSD(s.issued, price)}</div>
        <div class="kpi-cell-sub">Supply emitido × precio</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-cell-label">Staking value</div>
        <div class="kpi-cell-value">${fmtUSD(s.staked, price)}</div>
        <div class="kpi-cell-sub">TAO bloqueado en USD</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-cell-label">Fully diluted</div>
        <div class="kpi-cell-value">$${((SUPPLY_MAX * price)/1e9).toFixed(2)}B</div>
        <div class="kpi-cell-sub">21M × precio</div>
      </div>
    </div>
    ` : ''}

    <!-- Info card -->
    <div class="info-card">
      <div class="info-card-label">// Sobre estas métricas</div>
      <p>Los datos vienen del endpoint <code style="font-family:'JetBrains Mono',monospace;color:var(--cyan)">/api/stats/latest/v1</code> de Taostats, alimentado por un nodo Bittensor. El bloque indicado es el último confirmado. Los valores en TAO se calculan dividiendo el campo raw (en RAO) por 10⁹. Si quieres entender qué significa cada término, consulta el <a href="aprende-basico.html">curso básico</a>.</p>
    </div>
  `;

  document.getElementById('content').innerHTML = html;
}

/* ----------- INIT ----------- */
(async function init(){
  const [stats, price] = await Promise.all([
    fetchStats(),
    fetchTaoPrice(),
  ]);
  STATE.stats = stats;
  STATE.taoPrice = price;
  render();
})();

// Smart back
(function(){
  function savePage(){
    try { sessionStorage.setItem('lastPage', location.pathname.replace(/^\//,'') || 'index.html'); } catch(e){}
  }
  window.addEventListener('beforeunload', savePage);
  document.addEventListener('visibilitychange', () => { if(document.visibilityState==='hidden') savePage(); });
  document.addEventListener('click', e => {
    const a = e.target.closest('a');
    if(a && a.href && a.host === location.host) savePage();
  });
})();
</script>

</body>
</html>
